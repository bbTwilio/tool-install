---
# Ansible role for installing and configuring Ngrok

- name: Check if Ngrok is already installed
  command: which ngrok
  register: ngrok_installed
  changed_when: false
  failed_when: false

- name: Get Ngrok version if installed
  command: ngrok version
  register: ngrok_version
  changed_when: false
  failed_when: false
  when: ngrok_installed.rc == 0

- name: Display Ngrok status
  debug:
    msg: "Ngrok is already installed: {{ ngrok_version.stdout | default('Version unknown') }}"
  when: ngrok_installed.rc == 0

- name: Install/Upgrade Ngrok via Homebrew
  homebrew:
    name: ngrok
    state: latest
  when:
    - not dry_run | default(false)
    - tool_action | default('install') != 'reinstall'
    - ansible_facts['os_family'] == 'Darwin'

- name: Force reinstall Ngrok via Homebrew
  shell: brew reinstall ngrok
  when:
    - not dry_run | default(false)
    - tool_action | default('install') == 'reinstall'
    - ansible_facts['os_family'] == 'Darwin'

- name: Simulate Ngrok installation/upgrade (dry run)
  debug:
    msg: "Would {{ tool_action | default('install') }} Ngrok via Homebrew"
  when:
    - dry_run | default(false)

- name: Create Ngrok config directory
  file:
    path: "{{ ansible_env.HOME }}/.ngrok2"
    state: directory
    mode: '0755'
  when: not dry_run | default(false)

- name: Check for existing Ngrok configuration
  stat:
    path: "{{ ansible_env.HOME }}/.ngrok2/ngrok.yml"
  register: ngrok_config

- name: Create basic Ngrok config if missing
  copy:
    dest: "{{ ansible_env.HOME }}/.ngrok2/ngrok.yml"
    content: |
      # Ngrok Configuration
      # Generated by macOS Development Tools Installer

      # Add your authtoken here:
      # authtoken: YOUR_AUTH_TOKEN

      # CAS connection setting
      connect_cas: host

      # Region (us, eu, ap, au, sa, jp, in)
      region: us

      # Console UI color scheme
      console_ui_color: transparent
    mode: '0600'
  when:
    - not ngrok_config.stat.exists
    - not dry_run | default(false)

- name: Add connect_cas to existing Ngrok config
  lineinfile:
    path: "{{ ansible_env.HOME }}/.ngrok2/ngrok.yml"
    line: "connect_cas: host"
    create: yes
    mode: '0600'
  when:
    - ngrok_config.stat.exists
    - not dry_run | default(false)

- name: Display Ngrok configuration instructions
  debug:
    msg: |
      ========================================
      Ngrok Post-Installation Setup:
      ========================================

      1. Add your authtoken to ~/.ngrok2/ngrok.yml:
         ngrok config add-authtoken YOUR_AUTH_TOKEN

      2. Or get your authtoken from:
         https://dashboard.ngrok.com/get-started/your-authtoken

      3. Test your setup:
         ngrok http 3000

      Note: connect_cas: host has been added to your config