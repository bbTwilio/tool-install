---
# Ansible role for installing Visual Studio Code on macOS

- name: Check if VS Code is already installed
  command: which code
  register: vscode_installed
  changed_when: false
  failed_when: false

- name: Check for VS Code in Applications folder
  stat:
    path: "/Applications/Visual Studio Code.app"
  register: vscode_app
  when: vscode_installed.rc != 0

- name: Get VS Code version if installed
  command: code --version
  register: vscode_version
  changed_when: false
  failed_when: false
  when: vscode_installed.rc == 0

- name: Display VS Code status
  debug:
    msg: "Visual Studio Code is already installed: {{ vscode_version.stdout_lines[0] | default('Version unknown') }}"
  when: vscode_installed.rc == 0 or vscode_app.stat.exists | default(false)

- name: Install/Upgrade Visual Studio Code via Homebrew Cask
  homebrew_cask:
    name: visual-studio-code
    state: latest
  when:
    - not dry_run | default(false)
    - tool_action | default('install') != 'reinstall'

- name: Force reinstall Visual Studio Code via Homebrew Cask
  shell: brew reinstall --cask visual-studio-code
  when:
    - not dry_run | default(false)
    - tool_action | default('install') == 'reinstall'

- name: Simulate VS Code installation/upgrade (dry run)
  debug:
    msg: "Would {{ tool_action | default('install') }} Visual Studio Code via Homebrew Cask"
  when:
    - dry_run | default(false)

- name: Add VS Code to PATH if not present
  lineinfile:
    path: "{{ ansible_env.HOME }}/.zshrc"
    line: 'export PATH="/Applications/Visual Studio Code.app/Contents/Resources/app/bin:$PATH"'
    create: yes
    state: present
  when:
    - vscode_installed.rc != 0
    - vscode_app.stat.exists | default(false)
    - not dry_run | default(false)

- name: Check for bash profile
  stat:
    path: "{{ ansible_env.HOME }}/.bash_profile"
  register: bash_profile

- name: Add VS Code to bash PATH if profile exists
  lineinfile:
    path: "{{ ansible_env.HOME }}/.bash_profile"
    line: 'export PATH="/Applications/Visual Studio Code.app/Contents/Resources/app/bin:$PATH"'
    state: present
  when:
    - bash_profile.stat.exists
    - vscode_installed.rc != 0
    - vscode_app.stat.exists | default(false)
    - not dry_run | default(false)

- name: Create VS Code settings directory
  file:
    path: "{{ ansible_env.HOME }}/Library/Application Support/Code/User"
    state: directory
    mode: '0755'
  when: not dry_run | default(false)

- name: Check for existing VS Code settings
  stat:
    path: "{{ ansible_env.HOME }}/Library/Application Support/Code/User/settings.json"
  register: vscode_settings

- name: Create basic VS Code settings if missing
  copy:
    dest: "{{ ansible_env.HOME }}/Library/Application Support/Code/User/settings.json"
    content: |
      {
        // Visual Studio Code Settings
        // Generated by macOS Development Tools Installer

        "editor.fontSize": 14,
        "editor.fontFamily": "SF Mono, Monaco, Courier New, monospace",
        "editor.tabSize": 2,
        "editor.insertSpaces": true,
        "editor.wordWrap": "on",
        "editor.minimap.enabled": false,
        "editor.formatOnSave": false,
        "editor.suggestSelection": "first",

        "terminal.integrated.fontSize": 13,
        "terminal.integrated.fontFamily": "SF Mono, Monaco, Courier New, monospace",

        "files.autoSave": "afterDelay",
        "files.autoSaveDelay": 1000,
        "files.exclude": {
          "**/.git": true,
          "**/.DS_Store": true,
          "**/node_modules": true,
          "**/__pycache__": true,
          "**/.pytest_cache": true
        },

        "workbench.startupEditor": "none",
        "workbench.colorTheme": "Default Dark+",

        "extensions.ignoreRecommendations": false,
        "telemetry.telemetryLevel": "off"
      }
    mode: '0644'
  when:
    - not vscode_settings.stat.exists
    - not dry_run | default(false)

- name: Display VS Code post-installation instructions
  debug:
    msg: |
      ========================================
      Visual Studio Code Post-Installation:
      ========================================

      VS Code has been installed successfully!

      To launch VS Code:
      - From Terminal: code
      - From Finder: Applications > Visual Studio Code

      Useful commands:
      - code .                 # Open current directory
      - code file.txt         # Open a specific file
      - code --install-extension <id>  # Install extension

      Recommended extensions:
      - Python: ms-python.python
      - GitLens: eamodio.gitlens
      - Docker: ms-azuretools.vscode-docker
      - YAML: redhat.vscode-yaml
      - Prettier: esbenp.prettier-vscode

      To install recommended extensions:
      code --install-extension ms-python.python
      code --install-extension eamodio.gitlens

      Settings file location:
      ~/Library/Application Support/Code/User/settings.json
  when: vscode_installed.rc != 0 or show_instructions | default(false)