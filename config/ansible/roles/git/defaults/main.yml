---
# Default variables for Git role

# Whether to configure Git after installation
configure_git: true

# Default branch name
default_branch: main

# Whether to set up Git aliases
setup_aliases: false

# Common Git aliases
git_aliases:
  co: checkout
  br: branch
  ci: commit
  st: status
  unstage: 'reset HEAD --'
  last: 'log -1 HEAD'
  visual: '!gitk'