---
# Ansible role for installing Git on macOS

- name: Check if Git is already installed
  command: which git
  register: git_installed
  changed_when: false
  failed_when: false

- name: Display Git status
  debug:
    msg: "Git is already installed at {{ git_installed.stdout }}"
  when: git_installed.rc == 0

- name: Install Git via Homebrew
  homebrew:
    name: git
    state: present
  when:
    - git_installed.rc != 0
    - not dry_run | default(false)

- name: Simulate Git installation (dry run)
  debug:
    msg: "Would install Git via Homebrew"
  when:
    - git_installed.rc != 0
    - dry_run | default(false)

- name: Get Git version
  command: git --version
  register: git_version
  changed_when: false
  when: git_installed.rc == 0 or not dry_run

- name: Display Git version
  debug:
    msg: "Git version: {{ git_version.stdout }}"
  when: git_version is defined and git_version.stdout is defined

- name: Configure Git default branch name
  git_config:
    name: init.defaultBranch
    value: main
    scope: global
  when:
    - not dry_run | default(false)
    - configure_git | default(true)

- name: Check for existing Git user configuration
  command: git config --global user.name
  register: git_user_name
  changed_when: false
  failed_when: false

- name: Prompt for Git user configuration if not set
  debug:
    msg: |
      Git user configuration is not set.
      Please run the following commands after installation:
        git config --global user.name "Your Name"
        git config --global user.email "your.email@example.com"
  when: git_user_name.rc != 0