---
# Ansible role for installing AWS CLI on macOS

- name: Check if AWS CLI is already installed
  command: which aws
  register: aws_installed
  changed_when: false
  failed_when: false

- name: Get AWS CLI version if installed
  command: aws --version
  register: aws_version
  changed_when: false
  failed_when: false
  when: aws_installed.rc == 0

- name: Display AWS CLI status
  debug:
    msg: "AWS CLI is already installed: {{ aws_version.stdout | default('Version unknown') }}"
  when: aws_installed.rc == 0

- name: Install AWS CLI via Homebrew
  homebrew:
    name: awscli
    state: present
  when:
    - aws_installed.rc != 0
    - not dry_run | default(false)

- name: Simulate AWS CLI installation (dry run)
  debug:
    msg: "Would install AWS CLI via Homebrew"
  when:
    - aws_installed.rc != 0
    - dry_run | default(false)

- name: Create AWS config directory
  file:
    path: "{{ ansible_env.HOME }}/.aws"
    state: directory
    mode: '0700'
  when: not dry_run | default(false)

- name: Check for existing AWS configuration
  stat:
    path: "{{ ansible_env.HOME }}/.aws/config"
  register: aws_config

- name: Create basic AWS config file if missing
  copy:
    dest: "{{ ansible_env.HOME }}/.aws/config"
    content: |
      # AWS CLI Configuration
      # Generated by macOS Development Tools Installer

      [default]
      region = us-east-1
      output = json

      # SSO Configuration Example (uncomment and modify as needed)
      # [profile my-sso-profile]
      # sso_start_url = https://my-sso.awsapps.com/start
      # sso_region = us-east-1
      # sso_account_id = 123456789012
      # sso_role_name = MyRole
      # region = us-east-1
      # output = json
    mode: '0600'
  when:
    - not aws_config.stat.exists
    - not dry_run | default(false)

- name: Display SSO configuration instructions
  debug:
    msg: |
      ========================================
      AWS CLI Post-Installation Setup:
      ========================================

      To configure AWS SSO:
      1. Run: aws configure sso
      2. Enter your SSO start URL
      3. Select your AWS account and role
      4. Choose a profile name

      To use the SSO profile:
      - aws s3 ls --profile your-profile-name
      - export AWS_PROFILE=your-profile-name

      For more information:
      https://docs.aws.amazon.com/cli/latest/userguide/cli-configure-sso.html
  when: aws_installed.rc != 0 or show_instructions | default(false)