[defaults]
# Ansible configuration for macOS Tool Installer
# This file ensures Ansible can find the roles directory correctly

# Set roles path relative to this config file
roles_path = ./roles

# Disable host key checking for localhost
host_key_checking = False

# Set the inventory to localhost
inventory = ./inventory

# Disable retry files
retry_files_enabled = False

# Set the stdout callback to minimal for cleaner output
stdout_callback = minimal

# Disable cowsay messages
nocows = True

# Set the default forks for parallel execution
forks = 10

# Enable fact caching for performance
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible-facts
fact_caching_timeout = 3600