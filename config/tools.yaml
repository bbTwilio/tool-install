# macOS Development Tools Configuration
# This file defines all available tools and their installation methods

tools:
  github_ssh:
    name: "GitHub SSH Setup"
    description: "Configure SSH authentication for GitHub"
    category: "vcs"
    command: "ssh -T git@github.com"
    documentation_url: "https://docs.github.com/en/authentication/connecting-to-github-with-ssh"
    install_methods:
      - type: ansible
        role: github
    verification:
      command: "ssh -T git@github.com 2>&1 | grep -q 'successfully authenticated' && echo 'SSH key configured' || echo 'SSH key not configured'"
      expected_pattern: "SSH key"

  aws_cli:
    name: "AWS CLI"
    description: "Amazon Web Services Command Line Interface"
    category: "cloud"
    command: "aws"
    version_flag: "--version"
    documentation_url: "https://docs.aws.amazon.com/cli/latest/userguide/getting-started-install.html"
    install_methods:
      - type: ansible
        role: aws_cli
    verification:
      command: "aws --version"
      expected_pattern: "aws-cli"

  aws_configure_sso:
    name: "AWS SSO Configuration"
    description: "Configure AWS SSO profiles"
    category: "cloud"
    command: "aws sts get-caller-identity"
    documentation_url: "https://docs.aws.amazon.com/cli/latest/userguide/cli-configure-sso.html"
    install_methods:
      - type: ansible
        role: aws_configure_sso
    verification:
      command: "test -f ~/.aws/config && echo 'AWS config exists' || echo 'AWS config not found'"
      expected_pattern: "AWS config"

  claude_code:
    name: "Claude Code"
    description: "Anthropic's official CLI for Claude"
    command: "claude"
    version_flag: "--version"
    category: "ai"
    install_methods:
      - type: ansible
        role: claude
      - type: direct_download
        url: "https://github.com/anthropics/claude-code/releases/latest"
        install_path: "/usr/local/bin/claude"
        checksum_url: "https://github.com/anthropics/claude-code/releases/latest/download/checksums.txt"
    post_install:
      - type: run_command
        command: "claude auth"
        description: "Authenticate with Claude"
        interactive: true
        required: false
    verification:
      command: "claude --version"
      expected_pattern: "claude"

  zscaler_cert:
    name: "ZScaler Certificate"
    description: "Configure ZScaler root certificate for AWS CLI"
    category: "security"
    command: "test -f ~/certs/zscaler_root_ca.pem && echo 'configured' || echo 'not configured'"
    documentation_url: "https://help.zscaler.com/zia/certificate-pinning"
    install_methods:
      - type: ansible
        role: zscaler_cert
    verification:
      command: "test -f ~/certs/zscaler_root_ca.pem && echo 'Zscaler cert configured'"
      expected_pattern: "Zscaler cert configured"

# Installation profiles - predefined sets of tools
profiles:
  essential:
    name: "Essential Tools"
    description: "Core development tools everyone needs"
    tools:
      - github_ssh

  cloud:
    name: "Cloud Development"
    description: "Tools for cloud and AWS development"
    tools:
      - aws_cli
      - aws_configure_sso
      - zscaler_cert

  full:
    name: "Full Stack"
    description: "All available tools"
    tools:
      - github_ssh
      - aws_cli
      - aws_configure_sso
      - claude_code
      - zscaler_cert

# Global settings
settings:
  ansible:
    inventory: "localhost,"
    connection: "local"
    verbosity: 0  # 0-4, higher is more verbose

  homebrew:
    auto_update: false  # Don't auto-update Homebrew during installations
    require_sudo: false

  ui:
    default_profile: null  # No default profile
    auto_select_uninstalled: true  # Pre-select uninstalled tools
    show_versions: true  # Show installed versions in UI
    confirm_install: true  # Ask for confirmation before installing

  logging:
    file: "tool-installer.log"
    level: "INFO"  # DEBUG, INFO, WARNING, ERROR